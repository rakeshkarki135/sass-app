

name : Django CI

on:
  push:
    branches:
      - main

jobs:
    build:
      runs-on: self-hosted
      
      env:
        DOCKER_USERNAME : ${{ vars.DOCKER_USERNAME }}
       
      steps:
         - name : Checkout Repository
           uses : actions/checkout@v4

         - name : Login to DockerHub
           uses : docker/login-action@v3
           with : 
              username : ${{ env.DOCKER_USERNAME }}
              password : ${{ secrets.DOCKER_TOKEN }}

        
         - name : Build app 
           run  : |
              docker build \
              -t $DOCKER_USERNAME/web:${{ github.sha }}
              -t $DOCKER_USERNAME/web:latest \
              ./CoursePlatform

         - name : Push app
           run  : |
              docker push $DOCKER_USERNAME/web:${{ github.sha }}
              docker push $DOCKER_USERNAME/web:latest 



         - name : Deploy
           run  : |
               cd /home/rakesh/Desktop/practices/django/sass-app/

               docker compose down --remove-orphans || true 
               docker compose pull 
               docker compose up -d

         
        
