

{% extends 'base.html' %} 



{% block content %}


<div class="mt-30">
 <form action="https://rc-epay.esewa.com.np/api/epay/main/v2/form" method="POST" class="w-2/3 m-auto flex gap-4 flex-col">
    <h1 class="text-center font-bold text-3xl">Esewa Payment</h1>
    <input type="text" id="amount" name="amount" value="100" placeholder="Amount" required>
    <input type="text" id="tax_amount" name="tax_amount" value ="10" placeholder="Tax Amount" required>
    <input type="text" id="total_amount" name="total_amount" value="110" placeholder="Total Amount" required>
    <input type="text" id="transaction_uuid" name="transaction_uuid" value="241028" placeholder="Transaction ID" required>
    <input type="text" id="product_code" name="product_code" value ="EPAYTEST" required>
    <input type="text" id="product_service_charge" name="product_service_charge" value="0" required>
    <input type="text" id="product_delivery_charge" name="product_delivery_charge" value="0" required>
    <input type="hidden" id="success_url" name="success_url" value="https://developer.esewa.com.np/success" required>
    <input type="hidden" id="failure_url" name="failure_url" value="https://developer.esewa.com.np/failure" required>
    <input type="hidden" id="signed_field_names" name="signed_field_names" value="total_amount,transaction_uuid,product_code" required>
    <input type="hidden" id="signature" name="signature" value="i94zsd3oXF6ZsSr/kGqT4sSzYQzjj1W/waxjWyRwaME=" required>
    <button type="submit" class="w-1/3 p-3 bg-red-400 border-gray-400 border hover:bg-red-500 text-white rounded-xl">Submit</button>
 </form>
</div>


{% endblock %}
